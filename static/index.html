<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Classifier Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom terminal font for the coder vibe */
        body { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-zinc-900 border border-red-900 rounded-lg shadow-2xl p-8">
        <h1 class="text-2xl font-bold text-red-500 mb-2">STELLAR_CLASSIFIER</h1>
        <p class="text-sm text-zinc-500 mb-6">Enter telescopic sensor data below to predict class.</p>

        <form id="predictForm" class="space-y-4">
            <div>
                <label class="block text-xs text-red-400 mb-1">Redshift</label>
                <input type="number" step="any" id="redshift" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500">
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">i-band</label>
                    <input type="number" step="any" id="i" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">r-band</label>
                    <input type="number" step="any" id="r" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">z-band</label>
                    <input type="number" step="any" id="z" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500">
                </div>
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Delta</label>
                <input type="number" step="any" id="delta" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500">
            </div>

            <button type="submit" class="w-full mt-4 bg-red-900 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition-colors duration-200">
                EXECUTE_PREDICTION
            </button>
        </form>

        <div id="resultBox" class="mt-6 hidden border-t border-zinc-800 pt-4">
            <p class="text-xs text-zinc-500">CLASSIFICATION_RESULT:</p>
            <p id="predictionText" class="text-3xl font-bold text-white tracking-widest mt-1">...</p>
        </div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page from refreshing
            
            const btn = e.target.querySelector('button');
            btn.innerText = "PROCESSING...";

            // Gather the data from the form
            const payload = {
                redshift: parseFloat(document.getElementById('redshift').value),
                i: parseFloat(document.getElementById('i').value),
                r: parseFloat(document.getElementById('r').value),
                z: parseFloat(document.getElementById('z').value),
                delta: parseFloat(document.getElementById('delta').value)
            };

            try {
                // Send the data to your FastAPI backend
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Display the result
                document.getElementById('resultBox').classList.remove('hidden');
                
                if(data.status === "success") {
                    document.getElementById('predictionText').innerText = data.prediction;
                    document.getElementById('predictionText').className = "text-3xl font-bold text-green-500 tracking-widest mt-1";
                } else {
                    document.getElementById('predictionText').innerText = "ERROR";
                    document.getElementById('predictionText').className = "text-3xl font-bold text-red-500 tracking-widest mt-1";
                }
            } catch (error) {
                alert("Cannot reach the backend. Is FastAPI running?");
            } finally {
                btn.innerText = "EXECUTE_PREDICTION";
            }
        });
    </script>
</body>
</html>
