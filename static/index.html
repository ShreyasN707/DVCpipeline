<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Classifier Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom terminal font for the coder vibe */
        body { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-zinc-900 border border-red-900 rounded-lg shadow-2xl p-8">
        <h1 class="text-2xl font-bold text-red-500 mb-2">STELLAR_CLASSIFIER // V2.0</h1>
        <p class="text-sm text-zinc-500 mb-6">Enter telescopic sensor data (including full photometric bands for color physics) to execute prediction.</p>

        <form id="predictForm" class="space-y-5">
            <div>
                <label class="block text-xs text-red-400 mb-1">Redshift</label>
                <input type="number" step="any" id="redshift" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors">
            </div>
            
            <div class="grid grid-cols-5 gap-3">
                <div>
                    <label class="block text-[10px] text-zinc-400 mb-1">u-band</label>
                    <input type="number" step="any" id="u" required class="w-full bg-black border border-zinc-700 rounded px-2 py-2 text-white focus:outline-none focus:border-red-500 text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-zinc-400 mb-1">g-band</label>
                    <input type="number" step="any" id="g" required class="w-full bg-black border border-zinc-700 rounded px-2 py-2 text-white focus:outline-none focus:border-red-500 text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-zinc-400 mb-1">r-band</label>
                    <input type="number" step="any" id="r" required class="w-full bg-black border border-zinc-700 rounded px-2 py-2 text-white focus:outline-none focus:border-red-500 text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-zinc-400 mb-1">i-band</label>
                    <input type="number" step="any" id="i" required class="w-full bg-black border border-zinc-700 rounded px-2 py-2 text-white focus:outline-none focus:border-red-500 text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-zinc-400 mb-1">z-band</label>
                    <input type="number" step="any" id="z" required class="w-full bg-black border border-zinc-700 rounded px-2 py-2 text-white focus:outline-none focus:border-red-500 text-sm transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-xs text-zinc-400 mb-1">Delta</label>
                <input type="number" step="any" id="delta" required class="w-full bg-black border border-zinc-700 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <button type="submit" class="w-full mt-6 bg-red-900 hover:bg-red-700 text-white font-bold py-3 px-4 rounded transition-colors duration-200 tracking-widest">
                EXECUTE_PREDICTION
            </button>
        </form>

        <div id="resultBox" class="mt-8 hidden border-t border-zinc-800 pt-6 text-center">
            <p class="text-xs text-zinc-500 tracking-widest">CLASSIFICATION_RESULT:</p>
            <p id="predictionText" class="text-4xl font-bold text-white tracking-widest mt-2">...</p>
        </div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page from refreshing
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "PROCESSING_PHYSICS...";
            btn.classList.add("opacity-75", "cursor-not-allowed");

            // Gather all 7 data points from the form
            const payload = {
                redshift: parseFloat(document.getElementById('redshift').value),
                u: parseFloat(document.getElementById('u').value),
                g: parseFloat(document.getElementById('g').value),
                r: parseFloat(document.getElementById('r').value),
                i: parseFloat(document.getElementById('i').value),
                z: parseFloat(document.getElementById('z').value),
                delta: parseFloat(document.getElementById('delta').value)
            };

            try {
                // Send the payload to the FastAPI backend
                const response = await fetch('https://stellar-object-classifier.onrender.com/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Display the result
                document.getElementById('resultBox').classList.remove('hidden');
                const predText = document.getElementById('predictionText');
                
                if(data.status === "success") {
                    predText.innerText = data.prediction;
                    // Add a neon green glow for successful classifications
                    predText.className = "text-4xl font-bold text-green-500 tracking-widest mt-2 drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]";
                } else {
                    predText.innerText = "ERROR";
                    // Add a neon red glow for errors
                    predText.className = "text-4xl font-bold text-red-500 tracking-widest mt-2 drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]";
                    console.error("Backend Error:", data.detail);
                }
            } catch (error) {
                alert("Cannot reach the backend. Is your FastAPI Uvicorn server running?");
            } finally {
                // Reset button state
                btn.innerText = originalText;
                btn.classList.remove("opacity-75", "cursor-not-allowed");
            }
        });
    </script>
</body>
</html>
